<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Lotara</title>
    <link rel="stylesheet" href="css/styles.css?v=6">
    <link rel="stylesheet" href="css/portal.css?v=6">
</head>
<body>

<main class="main">
    <div id="topbar-mount"></div>

    <div class="content">

        <!-- Momentum -->
        <div class="momentum-bar">
            <div class="momentum-cell">
                <div class="momentum-val" id="m-streak" style="color:#a78bfa">—</div>
                <div class="momentum-lbl">Day streak</div>
            </div>
            <div class="momentum-cell">
                <div class="momentum-val" id="m-days" style="color:#ffd43b">—</div>
                <div class="momentum-lbl">Days active this month</div>
            </div>
            <div class="momentum-cell">
                <div class="momentum-val" id="m-rate" style="color:#4ade80">—%</div>
                <div class="momentum-lbl">Habit completion rate</div>
            </div>
        </div>

        <!-- Weekly wins -->
        <div class="wins-card">
            <div class="wins-tag" id="wins-tag-icon"></div>
            <div class="wins-body" id="wins-body">Loading your wellness data…</div>
            <div class="wins-pills" id="wins-pills"></div>
        </div>

        <!-- Top habits + Mood -->
        <div class="two-col">
            <div class="card">
                <div class="card-label" id="lbl-habits"></div>
                <div id="habits-list">
                    <div class="skeleton" style="height:54px;margin-bottom:10px"></div>
                    <div class="skeleton" style="height:54px;margin-bottom:10px"></div>
                    <div class="skeleton" style="height:54px"></div>
                </div>
            </div>
            <div class="card">
                <div class="card-label" id="lbl-mood"></div>
                <div class="mood-chart">
                    <svg id="mood-svg" viewBox="0 0 200 76" preserveAspectRatio="none"></svg>
                </div>
                <div class="mood-trend-label" id="mood-trend"></div>
            </div>
        </div>

        <!-- Latest journal -->
        <div class="card" id="journal-card" style="margin-bottom:22px">
            <div class="card-label" id="lbl-journal"></div>
            <div class="skeleton" style="height:90px"></div>
        </div>

        <!-- App CTA -->
        <div class="cta-banner">
            <div>
                <h3>Your full journey lives in the app</h3>
                <p>Guided meditations, deep insights, and more</p>
            </div>
            <a href="https://apps.apple.com/us/app/lotara/id6749601041" class="btn-cta" target="_blank" rel="noopener">Open Lotara</a>
        </div>

    </div>
</main>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js?v=6"></script>
<script src="js/auth.js?v=6"></script>
<script src="js/portal-data.js?v=6"></script>
<script src="js/portal-shell.js?v=6"></script>
<script>
firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.firestore();

bootPortal({ active: 'dashboard' });

// Inject card label icons + topbar
document.getElementById('lbl-habits').innerHTML  = ICONS.target + 'Top habits';
document.getElementById('lbl-mood').innerHTML    = ICONS.heart  + 'Mood — last 7 days';
document.getElementById('lbl-journal').innerHTML = ICONS.book   + 'Latest journal entry';
document.getElementById('wins-tag-icon').innerHTML = ICONS.sparkles + 'Your week in review';

document.getElementById('topbar-mount').outerHTML = renderTopbar({ showStreak: true });

requireAuth('/signin.html').then(async user => {
    setupSidebar(user);
    setupTopbar(user);
    const uid = user.uid;

    // NOTE: iOS does NOT use orderBy on habitCompletions (no composite index exists).
    // Use the same simple .where(userId) and sort in JS — matches iOS exactly.
    const [hSnap, cSnap, mSnap, jSnap] = await Promise.all([
        db.collection(`users/${uid}/habits`).get().catch(e => { console.error('habits', e); return {docs:[]}; }),
        db.collection('habitCompletions').where('userId','==',uid).get().catch(e => { console.error('completions', e); return {docs:[]}; }),
        db.collection(`users/${uid}/moods`).orderBy('timestamp','desc').limit(30).get().catch(e => { console.error('moods', e); return {docs:[]}; }),
        db.collection(`users/${uid}/journal`).orderBy('date','desc').limit(10).get().catch(e => { console.error('journal', e); return {docs:[]}; }),
    ]);

    const habits      = hSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    const completions = cSnap.docs.map(d => ({ id: d.id, ...d.data() }))
                            .sort((a, b) => toJS(b.date) - toJS(a.date));
    const moods       = mSnap.docs.map(d => d.data());
    const journals    = jSnap.docs.map(d => d.data());

    console.log('[Lotara] loaded:', { habits: habits.length, completions: completions.length, moods: moods.length, journals: journals.length });

    const streak = calcOverallStreak(completions);
    document.getElementById('streak-val').textContent = streak;
    document.getElementById('m-streak').textContent    = streak;

    const now = new Date();
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
    const activeDays = new Set(completions.filter(c => toJS(c.date) >= monthStart).map(c => toDateStr(c.date)));
    document.getElementById('m-days').textContent = activeDays.size;

    const monthCompletions = completions.filter(c => toJS(c.date) >= monthStart).length;
    const totalPossible    = habits.length * now.getDate();
    const rate = totalPossible > 0 ? Math.round((monthCompletions / totalPossible) * 100) : 0;
    document.getElementById('m-rate').textContent = rate + '%';

    // Weekly wins
    const weekAgo = new Date(now); weekAgo.setDate(now.getDate() - 7);
    const weekJournals    = journals.filter(j => toJS(j.date) >= weekAgo).length;
    const weekCompletions = completions.filter(c => toJS(c.date) >= weekAgo);
    const topHabit        = habits[0] ? habitName(habits[0]) : 'your habit';
    const topHabitDays    = habits[0]
        ? new Set(weekCompletions.filter(c => c.habitId === habits[0].id).map(c => toDateStr(c.date))).size
        : 0;
    document.getElementById('wins-body').textContent =
        `This week you journaled ${weekJournals} time${weekJournals !== 1 ? 's' : ''} and hit your ${topHabit} goal ${topHabitDays} out of 7 days. Keep building momentum.`;

    const pills = [];
    if (streak > 0)           pills.push(`${streak} day streak`);
    if (weekJournals > 0)     pills.push(`${weekJournals} journal ${weekJournals === 1 ? 'entry' : 'entries'}`);
    if (rate >= 70)           pills.push('Strong completion rate');
    if (activeDays.size >= 5) pills.push('Active all week');
    document.getElementById('wins-pills').innerHTML = pills.map(p => `<span class="win-pill">${p}</span>`).join('');

    // Top 3 habits
    const habitsList = document.getElementById('habits-list');
    if (!habits.length) {
        habitsList.innerHTML = `<div class="empty-state">
            <div class="empty-state-icon">${ICONS.target}</div>
            No habits yet — add some in the app
        </div>`;
    } else {
        habitsList.innerHTML = habits.slice(0,3).map((h, i) => {
            const color = habitColor(h, i);
            const hc = completions.filter(c => c.habitId === h.id);
            const dots = sevenDayDots(hc).map(done =>
                `<div class="dot${done ? ' done' : ''}" style="${done ? `--dot-color:${color}` : ''}"></div>`
            ).join('');
            const pct    = monthlyCompletionPct(hc);
            const streak = calcHabitStreak(hc);
            return `<div class="habit-row">
                <div class="habit-ring">${habitRingSVG(pct, color)}</div>
                <div class="habit-info">
                    <div class="habit-name">${habitName(h)}</div>
                    <div class="habit-dots">${dots}</div>
                </div>
                <div class="habit-streak-badge">${streak}d</div>
            </div>`;
        }).join('');
    }

    // Mood chart
    const moodScores = moods.slice(0,7).reverse().map(m => m.value || m.score || 5);
    renderMoodSVG('mood-svg', moodScores);
    const tEl = document.getElementById('mood-trend');
    if (moodScores.length >= 2) {
        const slope = moodScores[moodScores.length-1] - moodScores[0];
        if (slope > 1)       tEl.innerHTML = ICONS.arrowUp + '<span style="color:#4ade80">Trending up</span>';
        else if (slope < -1) tEl.innerHTML = ICONS.arrowDown + '<span style="color:#74c0fc">Trending down</span>';
        else                  tEl.innerHTML = ICONS.minus + '<span style="color:rgba(255,255,255,0.5)">Stable</span>';
    } else {
        tEl.innerHTML = '';
    }

    // Latest journal
    const jCard = document.getElementById('journal-card');
    if (!journals.length) {
        jCard.innerHTML = `
            <div class="card-label">${ICONS.book}Latest journal entry</div>
            <div class="empty-state">
                <div class="empty-state-icon">${ICONS.feather}</div>
                No journal entries yet —<br>start writing in the Lotara app
            </div>`;
    } else {
        const e = journals[0];
        const d = toJS(e.date);
        const dateStr = d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}) + ' · ' +
                        d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
        const mc = moodColor(e.mood);
        const ml = moodLabel(e.mood);
        jCard.innerHTML = `
            <div class="card-label">${ICONS.book}Latest journal entry</div>
            <div class="entry-date">${dateStr}</div>
            ${e.mood ? `<span class="mood-tag" style="background:${mc}1f;color:${mc};border:1px solid ${mc}40">${ml}</span>` : ''}
            ${e.title ? `<div style="font-size:15px;font-weight:400;margin-bottom:6px">${e.title}</div>` : ''}
            <div class="entry-text">${e.content || ''}</div>
            <a href="journal.html" class="more-link">Read more in journal ${ICONS.arrowRight}</a>`;
    }
});
</script>
</body>
</html>
