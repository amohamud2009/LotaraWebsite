<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habits — Lotara</title>
    <link rel="stylesheet" href="css/styles.css?v=6">
    <link rel="stylesheet" href="css/portal.css?v=6">
</head>
<body>

<main class="main">
    <div id="topbar-mount"></div>

    <div class="content">

        <div class="page-header">
            <div class="page-title">Your habits</div>
            <div class="page-sub">Track what matters and build momentum</div>
        </div>

        <!-- Stats -->
        <div class="stat-row" id="stat-row" style="grid-template-columns:repeat(3,1fr)">
            <div class="card skeleton" style="height:90px"></div>
            <div class="card skeleton" style="height:90px"></div>
            <div class="card skeleton" style="height:90px"></div>
        </div>

        <!-- Habit grid -->
        <div class="habit-grid" id="habit-grid">
            <div class="card skeleton" style="height:140px"></div>
            <div class="card skeleton" style="height:140px"></div>
            <div class="card skeleton" style="height:140px"></div>
            <div class="card skeleton" style="height:140px"></div>
        </div>

    </div>
</main>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js?v=6"></script>
<script src="js/auth.js?v=6"></script>
<script src="js/portal-data.js?v=6"></script>
<script src="js/portal-shell.js?v=6"></script>
<script>
firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.firestore();

bootPortal({ active: 'habits' });
document.getElementById('topbar-mount').outerHTML = renderTopbar({ showStreak: true, title: 'Habits' });

requireAuth('/signin.html').then(async user => {
    setupSidebar(user);
    setupTopbar(user);
    document.getElementById('topbar-greeting').textContent = 'Habits';
    const uid = user.uid;

    // No orderBy on habitCompletions — matches iOS exactly (no composite index needed)
    const [hSnap, cSnap] = await Promise.all([
        db.collection(`users/${uid}/habits`).get().catch(e => { console.error('habits', e); return {docs:[]}; }),
        db.collection('habitCompletions').where('userId','==',uid).get().catch(e => { console.error('completions', e); return {docs:[]}; }),
    ]);

    const habits      = hSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    const completions = cSnap.docs.map(d => ({ id: d.id, ...d.data() }))
                              .sort((a, b) => toJS(b.date) - toJS(a.date));

    console.log('[Lotara] habits page:', { habits: habits.length, completions: completions.length });

    const streak = calcOverallStreak(completions);
    document.getElementById('streak-val').textContent = streak;

    const now = new Date();
    const ms  = new Date(now.getFullYear(), now.getMonth(), 1);
    const monthC = completions.filter(c => toJS(c.date) >= ms).length;
    const rate   = habits.length > 0 ? Math.round((monthC / (habits.length * now.getDate())) * 100) : 0;
    const bestStreak = habits.reduce((b, h) => Math.max(b, calcHabitStreak(completions.filter(c => c.habitId === h.id))), 0);

    // Stats
    document.getElementById('stat-row').innerHTML = `
        <div class="card">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;color:#a78bfa">${ICONS.activity}<span style="font-size:12px;color:rgba(255,255,255,0.5)">Completion</span></div>
            <div class="stat-value" style="color:#a78bfa">${rate}%</div>
            <div class="stat-label">This month</div>
        </div>
        <div class="card">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;color:#ffd43b">${ICONS.flame}<span style="font-size:12px;color:rgba(255,255,255,0.5)">Best streak</span></div>
            <div class="stat-value" style="color:#ffd43b">${bestStreak}d</div>
            <div class="stat-label">Current</div>
        </div>
        <div class="card">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;color:#4ade80">${ICONS.target}<span style="font-size:12px;color:rgba(255,255,255,0.5)">Habits</span></div>
            <div class="stat-value" style="color:#4ade80">${habits.length}</div>
            <div class="stat-label">Active</div>
        </div>`;

    // Habit grid
    const grid = document.getElementById('habit-grid');
    if (!habits.length) {
        grid.outerHTML = `<div class="card"><div class="empty-state">
            <div class="empty-state-icon">${ICONS.target}</div>
            No habits yet —<br>add your first habit in the Lotara app
        </div></div>`;
        return;
    }

    grid.innerHTML = habits.map((h, i) => {
        const color  = habitColor(h, i);
        const hc     = completions.filter(c => c.habitId === h.id);
        const pct    = monthlyCompletionPct(hc);
        const s      = calcHabitStreak(hc);
        const dots   = sevenDayDots(hc);
        const status = pct >= 80 ? 'Strong' : pct >= 50 ? 'On track' : pct >= 20 ? 'Building' : 'Keep going';
        const dotsHTML = dots.map(done =>
            `<div class="dot${done ? ' done' : ''}" style="${done ? `--dot-color:${color}` : ''}"></div>`
        ).join('');
        return `<div class="habit-grid-card" style="animation-delay:${i*0.05}s">
            <div class="habit-grid-top">
                ${habitRingSVG(pct, color)}
                <div class="habit-grid-name">${habitName(h)}</div>
                <span class="habit-streak-pill" style="background:${color}1f;color:${color};border:1px solid ${color}40">${s}d</span>
            </div>
            <div class="habit-grid-bar">
                <div class="habit-grid-fill" style="width:${pct}%;background:linear-gradient(90deg, ${color}, ${color}aa)"></div>
            </div>
            <div class="habit-grid-dots">${dotsHTML}</div>
            <div class="habit-grid-status">
                <span>${pct}% this month</span>
                <span class="habit-grid-status-tag" style="color:${color}">${status}</span>
            </div>
        </div>`;
    }).join('');
});
</script>
</body>
</html>
