<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal — Lotara</title>
    <link rel="stylesheet" href="css/styles.css?v=9">
    <link rel="stylesheet" href="css/portal.css?v=9">
</head>
<body>

<main class="main">
    <div id="topbar-mount"></div>

    <div class="content">
        <div class="page-header">
            <div class="page-title">Journal</div>
            <div class="page-sub">Your thoughts, reflections, and growth</div>
        </div>

        <!-- Stats -->
        <div class="stat-row" id="stat-row" style="grid-template-columns:repeat(3,1fr)">
            <div class="card skeleton" style="height:90px"></div>
            <div class="card skeleton" style="height:90px"></div>
            <div class="card skeleton" style="height:90px"></div>
        </div>

        <!-- Entries -->
        <div class="journal-grid" id="journal-list">
            <div class="card skeleton" style="height:120px"></div>
            <div class="card skeleton" style="height:120px"></div>
            <div class="card skeleton" style="height:120px"></div>
        </div>
    </div>
</main>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js?v=9"></script>
<script src="js/auth.js?v=9"></script>
<script src="js/portal-shell.js?v=9"></script>
<script src="js/portal-data.js?v=9"></script>
<script>
firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.firestore();

bootPortal({ active: 'journal' });
document.getElementById('topbar-mount').outerHTML = renderTopbar({ showStreak: false });

requireAuth('/signin.html').then(async user => {
    setupSidebar(user);
    setupTopbar(user);
    document.getElementById('topbar-greeting').textContent = 'Journal';
    const uid = user.uid;

    const snap = await db.collection(`users/${uid}/journal`).orderBy('date','desc').limit(40).get().catch(()=>({docs:[]}));
    const entries = snap.docs.map(d => d.data());

    const now = new Date();
    const ms  = new Date(now.getFullYear(), now.getMonth(), 1);
    const wAgo = new Date(now); wAgo.setDate(now.getDate()-7);
    const thisMonth = entries.filter(e => toJS(e.date) >= ms).length;
    const thisWeek  = entries.filter(e => toJS(e.date) >= wAgo).length;

    const avgMood = entries.length
        ? (entries.reduce((a,e)=>a+(e.mood||5), 0) / entries.length).toFixed(1)
        : '—';

    document.getElementById('stat-row').innerHTML = `
        <div class="card">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;color:#ff8cc8">${ICONS.feather}<span style="font-size:12px;color:rgba(255,255,255,0.5)">This month</span></div>
            <div class="stat-value" style="color:#ff8cc8">${thisMonth}</div>
            <div class="stat-label">Entries</div>
        </div>
        <div class="card">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;color:#a78bfa">${ICONS.calendar}<span style="font-size:12px;color:rgba(255,255,255,0.5)">This week</span></div>
            <div class="stat-value" style="color:#a78bfa">${thisWeek}</div>
            <div class="stat-label">Entries</div>
        </div>
        <div class="card">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;color:#4ade80">${ICONS.smile}<span style="font-size:12px;color:rgba(255,255,255,0.5)">Avg mood</span></div>
            <div class="stat-value" style="color:#4ade80">${avgMood}</div>
            <div class="stat-label">All entries</div>
        </div>`;

    // Entries
    const list = document.getElementById('journal-list');
    if (!entries.length) {
        list.outerHTML = `<div class="card"><div class="empty-state">
            <div class="empty-state-icon">${ICONS.feather}</div>
            No journal entries yet —<br>start writing in the Lotara app
        </div></div>`;
        return;
    }

    list.innerHTML = entries.map((e, i) => {
        const d = toJS(e.date);
        const now2 = new Date();
        const diffD = Math.floor((now2 - d) / 86400000);
        const dateStr = diffD === 0
            ? 'Today, ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})
            : diffD === 1 ? 'Yesterday'
            : d.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
        const mc = moodColor(e.mood);
        const ml = moodLabel(e.mood);
        const tags = (e.tags || []).slice(0,4).map(t => `<span class="tag-chip">${t}</span>`).join('');
        return `<div class="journal-entry" style="--mood-c:${mc};animation-delay:${i*0.04}s">
            <div class="journal-entry-meta">
                <span class="journal-entry-date">${dateStr}</span>
                ${e.mood ? `<span class="mood-tag" style="margin:0;background:${mc}1f;color:${mc};border:1px solid ${mc}40;font-size:11px;padding:2px 10px">${ml}</span>` : ''}
            </div>
            ${e.title ? `<div class="journal-entry-title">${e.title}</div>` : ''}
            <div class="journal-entry-text">${e.content || ''}</div>
            ${tags ? `<div class="journal-entry-tags">${tags}</div>` : ''}
        </div>`;
    }).join('');
});
</script>
</body>
</html>
