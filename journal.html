<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal — Lotara</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/portal.css">
</head>
<body>

<aside class="sidebar">
    <div class="sb-logo"><img src="assets/images/lotara-logo.png" alt="Lotara"></div>
    <div class="sb-user">
        <div class="sb-avatar" id="sb-avatar">?</div>
        <div><div class="sb-name" id="sb-name">Loading…</div><div class="sb-plan">Premium</div></div>
    </div>
    <nav class="sb-nav">
        <a href="dashboard.html" class="nav-item"><span class="nav-dot" style="background:#8b5cf6"></span>Dashboard</a>
        <a href="habits.html"    class="nav-item"><span class="nav-dot" style="background:#74c0fc"></span>Habits</a>
        <a href="journal.html"   class="nav-item active"><span class="nav-dot" style="background:#ff8cc8"></span>Journal</a>
        <a href="mood.html"      class="nav-item"><span class="nav-dot" style="background:#4ade80"></span>Mood</a>
        <a href="progress.html"  class="nav-item"><span class="nav-dot" style="background:#ffd43b"></span>Progress</a>
        <a href="settings.html"  class="nav-item"><span class="nav-dot" style="background:rgba(255,255,255,0.35)"></span>Settings</a>
    </nav>
    <div class="sb-footer">
        <a href="https://apps.apple.com/us/app/lotara/id6749601041" class="btn-app" target="_blank" rel="noopener">Open in App</a>
        <button class="btn-signout">Sign out</button>
    </div>
</aside>

<main class="main">
    <div class="topbar">
        <div>
            <div class="topbar-greeting" id="topbar-greeting">Journal</div>
            <div class="topbar-date" id="topbar-date"></div>
        </div>
    </div>

    <div class="content">
        <!-- Stats -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px" id="journal-stats">
            <div class="card skeleton" style="height:80px"></div>
            <div class="card skeleton" style="height:80px"></div>
        </div>

        <!-- Entries -->
        <div class="card">
            <div class="card-label">Recent entries</div>
            <div id="journal-list">
                <div class="skeleton" style="height:80px;margin-bottom:10px"></div>
                <div class="skeleton" style="height:80px;margin-bottom:10px"></div>
                <div class="skeleton" style="height:80px"></div>
            </div>
        </div>
    </div>
</main>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/portal-data.js"></script>
<script>
firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.firestore();

requireAuth('/signin.html').then(async user => {
    setupSidebar(user);
    setupTopbar(user);
    const uid = user.uid;

    const snap = await db.collection(`users/${uid}/journal`).orderBy('date','desc').limit(30).get().catch(()=>({docs:[]}));
    const entries = snap.docs.map(d=>d.data());

    const now = new Date();
    const ms  = new Date(now.getFullYear(), now.getMonth(), 1);
    const thisMonth = entries.filter(e => toJS(e.date) >= ms).length;

    document.getElementById('journal-stats').innerHTML = `
        <div class="card">
            <div class="stat-value" style="color:#ff8cc8">${thisMonth}</div>
            <div class="stat-label">Entries this month</div>
        </div>
        <div class="card">
            <div class="stat-value" style="color:#a78bfa">${entries.length}</div>
            <div class="stat-label">Total loaded</div>
        </div>`;

    if (!entries.length) {
        document.getElementById('journal-list').innerHTML =
            '<div class="empty-state">No journal entries yet —<br>start writing in the Lotara app</div>';
        return;
    }

    document.getElementById('journal-list').innerHTML = entries.map(e => {
        const d   = toJS(e.date);
        const now = new Date();
        const diffMs = now - d;
        const diffD  = Math.floor(diffMs / 86400000);
        const dateStr = diffD === 0 ? 'Today, ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})
            : diffD === 1 ? 'Yesterday'
            : d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
        const mc = moodColor(e.mood);
        const ml = moodLabel(e.mood);
        const tags = (e.tags || []).slice(0,3).map(t => `<span class="tag-chip">${t}</span>`).join('');
        return `<div class="journal-card-item">
            <div class="journal-meta" style="margin-bottom:6px">
                <span class="entry-date" style="margin:0">${dateStr}</span>
                ${e.mood ? `<span class="mood-tag" style="margin:0;background:${mc}18;color:${mc};border:1px solid ${mc}30;font-size:11px;padding:2px 9px">${ml}</span>` : ''}
            </div>
            ${e.title ? `<div class="journal-title">${e.title}</div>` : ''}
            <div class="journal-preview">${e.content || ''}</div>
            ${tags ? `<div class="journal-meta" style="margin-top:8px">${tags}</div>` : ''}
        </div>`;
    }).join('');
});
</script>
</body>
</html>
