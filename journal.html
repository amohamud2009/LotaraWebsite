<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal — Lotara</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        html,body{height:100%;overflow:hidden}
        body{background:linear-gradient(135deg,#1a1f36 0%,#2d3561 30%,#3d3575 60%,#1a1f36 100%);background-size:400% 400%;animation:breathingGradient 20s ease-in-out infinite;display:flex;position:relative}
        body::before{content:'';position:fixed;top:-20%;right:-10%;width:600px;height:600px;background:radial-gradient(circle,rgba(99,102,241,0.12) 0%,transparent 60%);border-radius:50%;animation:breathing 10s ease-in-out infinite;pointer-events:none;z-index:0}
        @keyframes breathingGradient{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
        @keyframes breathing{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.1);opacity:0.8}}
        .sidebar{width:230px;min-height:100vh;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:10;background:rgba(255,255,255,0.07);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-right:1px solid rgba(255,255,255,0.15)}
        .sidebar-logo{padding:22px 22px 18px;border-bottom:1px solid rgba(255,255,255,0.12)}
        .sidebar-logo img{height:52px;width:auto;filter:drop-shadow(0 2px 10px rgba(0,0,0,0.3))}
        .sidebar-nav{flex:1;padding:16px 0}
        .nav-item{display:flex;align-items:center;gap:12px;padding:11px 22px;font-size:15px;font-weight:300;color:rgba(255,255,255,0.65);text-decoration:none;transition:all .25s ease;position:relative}
        .nav-item:hover{color:#fff;background:rgba(255,255,255,0.06)}
        .nav-item.active{color:#fff;background:rgba(255,255,255,0.1);font-weight:400}
        .nav-item.active::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;background:linear-gradient(180deg,#8b5cf6,#748ffc);border-radius:0 3px 3px 0}
        .nav-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
        .sidebar-footer{padding:18px 22px;border-top:1px solid rgba(255,255,255,0.1);display:flex;flex-direction:column;gap:10px}
        .btn-app{display:block;text-align:center;padding:11px 20px;background:linear-gradient(135deg,#8b5cf6,#748ffc);color:#fff;font-size:14px;font-weight:500;border-radius:999px;text-decoration:none;transition:all .3s ease}
        .btn-signout{background:none;border:none;color:rgba(255,255,255,0.4);font-size:14px;font-weight:300;cursor:pointer;font-family:var(--font-system);padding:4px 0;text-align:center;width:100%;transition:color .2s}
        .btn-signout:hover{color:rgba(255,255,255,.7)}
        .main{margin-left:230px;flex:1;height:100vh;overflow-y:auto;position:relative;z-index:1;display:flex;align-items:center;justify-content:center}
        .coming-soon{text-align:center;padding:48px 32px;color:#fff}
        .coming-pill{display:inline-block;padding:6px 20px;border-radius:999px;font-size:13px;font-weight:400;margin-bottom:24px;background:#ff8cc818;border:1px solid #ff8cc840;color:#ff8cc8}
        .coming-soon h1{font-size:36px;font-weight:300;letter-spacing:-0.5px;margin-bottom:10px}
        .coming-soon p{font-size:16px;font-weight:300;color:rgba(255,255,255,0.55);margin-bottom:32px;line-height:1.6}
        .btn-open{display:inline-block;padding:14px 32px;background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.3);border-radius:999px;font-size:15px;font-weight:500;text-decoration:none;transition:all .3s ease}
        .btn-open:hover{background:#fff;color:#8b5cf6;transform:translateY(-2px)}
        @media(max-width:768px){.sidebar{display:none}.main{margin-left:0}}
    </style>
</head>
<body>
<aside class="sidebar">
    <div class="sidebar-logo"><img src="assets/images/lotara-logo.png" alt="Lotara"></div>
    <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item"><span class="nav-dot" style="background:#8b5cf6"></span>Dashboard</a>
        <a href="habits.html" class="nav-item"><span class="nav-dot" style="background:#74c0fc"></span>Habits</a>
        <a href="journal.html" class="nav-item active"><span class="nav-dot" style="background:#ff8cc8"></span>Journal</a>
        <a href="mood.html" class="nav-item"><span class="nav-dot" style="background:#4ade80"></span>Mood</a>
        <a href="progress.html" class="nav-item"><span class="nav-dot" style="background:#ffd43b"></span>Progress</a>
        <a href="settings.html" class="nav-item"><span class="nav-dot" style="background:rgba(255,255,255,0.4)"></span>Settings</a>
    </nav>
    <div class="sidebar-footer">
        <a href="https://apps.apple.com/us/app/lotara/id6749601041" class="btn-app" target="_blank">Open in App</a>
        <button class="btn-signout" id="btn-signout">Sign out</button>
    </div>
</aside>
<main class="main">
    <div class="coming-soon">
        <div class="coming-pill">Journal</div>
        <h1>Coming soon</h1>
        <p>The full journal page is on its way.<br>Track your journal in the Lotara app in the meantime.</p>
        <a href="https://apps.apple.com/us/app/lotara/id6749601041" class="btn-open" target="_blank">Open Lotara App</a>
    </div>
</main>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script>
    firebase.initializeApp(FIREBASE_CONFIG);
    requireAuth('/signin.html');
    document.getElementById('btn-signout').addEventListener('click',async()=>{await firebase.auth().signOut();window.location.href='/signin.html'});
</script>
</body>
</html>
