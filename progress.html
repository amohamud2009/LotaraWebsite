<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress — Lotara</title>
    <link rel="stylesheet" href="css/styles.css?v=6">
    <link rel="stylesheet" href="css/portal.css?v=6">
</head>
<body>

<main class="main">
    <div id="topbar-mount"></div>

    <div class="content">
        <div class="page-header">
            <div class="page-title">Progress</div>
            <div class="page-sub">Your wellness journey at a glance</div>
        </div>

        <!-- Stats -->
        <div class="stat-row" id="stat-row">
            <div class="card skeleton" style="height:100px"></div>
            <div class="card skeleton" style="height:100px"></div>
            <div class="card skeleton" style="height:100px"></div>
            <div class="card skeleton" style="height:100px"></div>
        </div>

        <!-- Activity bars -->
        <div class="card" style="margin-bottom:22px">
            <div class="card-label" id="lbl-activity"></div>
            <div id="activity-bars">
                <div class="skeleton" style="height:18px;margin-bottom:14px"></div>
                <div class="skeleton" style="height:18px;margin-bottom:14px"></div>
                <div class="skeleton" style="height:18px;margin-bottom:14px"></div>
                <div class="skeleton" style="height:18px"></div>
            </div>
        </div>

        <!-- Milestones -->
        <div class="card">
            <div class="card-label" id="lbl-milestones"></div>
            <div id="milestones-list">
                <div class="skeleton" style="height:60px;margin-bottom:10px"></div>
                <div class="skeleton" style="height:60px;margin-bottom:10px"></div>
                <div class="skeleton" style="height:60px"></div>
            </div>
        </div>
    </div>
</main>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js?v=6"></script>
<script src="js/auth.js?v=6"></script>
<script src="js/portal-data.js?v=6"></script>
<script src="js/portal-shell.js?v=6"></script>
<script>
firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.firestore();

bootPortal({ active: 'progress' });
document.getElementById('topbar-mount').outerHTML = renderTopbar({ showStreak: true });

document.getElementById('lbl-activity').innerHTML   = ICONS.activity + 'This month\'s activity';
document.getElementById('lbl-milestones').innerHTML = ICONS.award    + 'Milestones';

requireAuth('/signin.html').then(async user => {
    setupSidebar(user);
    setupTopbar(user);
    document.getElementById('topbar-greeting').textContent = 'Progress';
    const uid = user.uid;

    // No orderBy on habitCompletions — iOS doesn't either (no composite index)
    const [hSnap, cSnap, mSnap, jSnap, medSnap] = await Promise.all([
        db.collection(`users/${uid}/habits`).get().catch(e => { console.error('habits', e); return {docs:[]}; }),
        db.collection('habitCompletions').where('userId','==',uid).get().catch(e => { console.error('completions', e); return {docs:[]}; }),
        db.collection(`users/${uid}/moods`).orderBy('timestamp','desc').limit(100).get().catch(e => { console.error('moods', e); return {docs:[]}; }),
        db.collection(`users/${uid}/journal`).orderBy('date','desc').limit(200).get().catch(e => { console.error('journal', e); return {docs:[]}; }),
        db.collection(`users/${uid}/meditation`).orderBy('date','desc').limit(100).get().catch(e => { console.error('meditation', e); return {docs:[]}; }),
    ]);

    const habits      = hSnap.docs.map(d => ({id:d.id,...d.data()}));
    const completions = cSnap.docs.map(d => ({id:d.id,...d.data()}))
                              .sort((a, b) => toJS(b.date) - toJS(a.date));
    const moods       = mSnap.docs.map(d => d.data());
    const journals    = jSnap.docs.map(d => d.data());
    const meditations = medSnap.docs.map(d => d.data());

    console.log('[Lotara] progress page:', { habits: habits.length, completions: completions.length, moods: moods.length, journals: journals.length, meditations: meditations.length });

    const streak = calcOverallStreak(completions);
    document.getElementById('streak-val').textContent = streak;

    // Longest streak
    const allDays = [...new Set(completions.map(c => toDateStr(c.date)))].sort();
    let longestStreak = 0, cur = 0;
    for (let i = 0; i < allDays.length; i++) {
        if (i === 0) cur = 1;
        else {
            const diff = (new Date(allDays[i]) - new Date(allDays[i-1])) / 86400000;
            cur = diff === 1 ? cur + 1 : 1;
        }
        longestStreak = Math.max(longestStreak, cur);
    }

    // Days on Lotara — earliest data point
    const allDates = [
        ...completions.map(c => toJS(c.date)),
        ...journals.map(j => toJS(j.date)),
        ...moods.map(m => toJS(m.timestamp)),
    ].filter(d => d.getTime() > 0);
    const earliest = allDates.length ? new Date(Math.min(...allDates)) : null;
    const daysOnLotara = earliest ? Math.max(1, Math.floor((Date.now() - earliest.getTime()) / 86400000)) : 0;

    // This month stats
    const now = new Date();
    const ms  = new Date(now.getFullYear(), now.getMonth(), 1);
    const monthJ   = journals.filter(j => toJS(j.date) >= ms).length;
    const monthMed = meditations.filter(m => toJS(m.date) >= ms).length;
    const monthMood= moods.filter(m => toJS(m.timestamp) >= ms).length;
    const monthC   = completions.filter(c => toJS(c.date) >= ms).length;
    const rate     = habits.length > 0 ? Math.round((monthC / (habits.length * now.getDate())) * 100) : 0;

    // Stat row
    document.getElementById('stat-row').innerHTML = [
        { icon: ICONS.calendar, val: daysOnLotara || '—', lbl: 'Days on Lotara', color: '#a78bfa' },
        { icon: ICONS.flame,    val: longestStreak,        lbl: 'Longest streak',  color: '#ffd43b' },
        { icon: ICONS.feather,  val: journals.length,      lbl: 'Total entries',   color: '#ff8cc8' },
        { icon: ICONS.target,   val: habits.length,        lbl: 'Active habits',   color: '#4ade80' },
    ].map(s => `<div class="card">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;color:${s.color}">${s.icon}<span style="font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:0.05em;text-transform:uppercase">${s.lbl}</span></div>
        <div class="stat-value" style="color:${s.color}">${s.val}</div>
    </div>`).join('');

    // Activity bars
    const bars = [
        { label: 'Journal entries this month', val: monthJ,    max: Math.max(monthJ, 30),    color: '#ff8cc8' },
        { label: 'Habit completion rate',       val: rate,      max: 100,                     color: '#a78bfa', suffix: '%' },
        { label: 'Meditation sessions',         val: monthMed,  max: Math.max(monthMed, 10),  color: '#74c0fc' },
        { label: 'Mood check-ins',              val: monthMood, max: Math.max(monthMood, 30), color: '#4ade80' },
    ];
    document.getElementById('activity-bars').innerHTML = bars.map(b => {
        const pct = b.max > 0 ? Math.round((b.val / b.max) * 100) : 0;
        return `<div class="progress-bar-wrap">
            <div class="progress-bar-top">
                <span class="progress-bar-label">${b.label}</span>
                <span class="progress-bar-value" style="color:${b.color}">${b.val}${b.suffix||''}</span>
            </div>
            <div class="progress-bar-track">
                <div class="progress-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,${b.color},${b.color}aa)"></div>
            </div>
        </div>`;
    }).join('');

    // Milestones — SVG icons only, no emojis
    const totalJ = journals.length, totalMed = meditations.length;
    const MILESTONES = [
        { icon: ICONS.flame,    title: '7-day streak',      target: 7,   current: longestStreak, unit: 'streak days',         color: '#ffd43b' },
        { icon: ICONS.zap,      title: '30-day streak',     target: 30,  current: longestStreak, unit: 'streak days',         color: '#a78bfa' },
        { icon: ICONS.feather,  title: 'First 10 journals', target: 10,  current: totalJ,        unit: 'journal entries',     color: '#ff8cc8' },
        { icon: ICONS.heart,    title: '10 meditations',    target: 10,  current: totalMed,      unit: 'meditation sessions', color: '#74c0fc' },
        { icon: ICONS.book,     title: '50 journal entries',target: 50,  current: totalJ,        unit: 'journal entries',     color: '#ff8cc8' },
        { icon: ICONS.award,    title: '100 days on Lotara',target: 100, current: daysOnLotara,  unit: 'days',                color: '#4ade80' },
    ];
    document.getElementById('milestones-list').innerHTML = MILESTONES.map(m => {
        const done  = m.current >= m.target;
        const close = !done && m.current >= m.target * 0.7;
        const badge = done  ? `<span class="milestone-badge badge-done">Done</span>`
                    : close ? `<span class="milestone-badge badge-close">${m.target - m.current} away</span>`
                    :         `<span class="milestone-badge badge-current">${m.current}/${m.target}</span>`;
        return `<div class="milestone-row">
            <div class="milestone-icon" style="background:${m.color}1a;color:${m.color};border:1px solid ${m.color}30">${m.icon}</div>
            <div class="milestone-info">
                <div class="milestone-title">${m.title}</div>
                <div class="milestone-date">${done ? 'Achieved' : m.current + ' ' + m.unit + ' so far'}</div>
            </div>
            ${badge}
        </div>`;
    }).join('');
});
</script>
</body>
</html>
