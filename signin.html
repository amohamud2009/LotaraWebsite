<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Lotara</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1f36 0%, #2d3561 35%, #4c3d8f 65%, #1a1f36 100%);
            background-size: 400% 400%;
            animation: breathingGradient 20s ease-in-out infinite;
            padding: 24px;
        }

        .signin-card {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 40px 36px;
            color: var(--white);
        }

        .signin-logo {
            display: flex;
            justify-content: center;
            margin-bottom: 8px;
        }

        .signin-logo img {
            height: 80px;
            width: auto;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.3));
        }

        .signin-title {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            color: var(--white);
            margin-bottom: 6px;
        }

        .signin-subtitle {
            text-align: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            color: var(--white);
            font-family: var(--font-system);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-group input:focus {
            border-color: rgba(139, 92, 246, 0.6);
            background: rgba(255, 255, 255, 0.09);
        }

        .btn-signin {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #8b5cf6, #748ffc);
            color: var(--white);
            font-family: var(--font-system);
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .btn-signin:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.4);
        }

        .btn-signin:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.12);
        }

        .divider-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }

        .btn-apple {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.08);
            color: var(--white);
            font-family: var(--font-system);
            font-size: 15px;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-apple:hover {
            background: rgba(255, 255, 255, 0.14);
            transform: translateY(-1px);
        }

        .apple-icon {
            width: 18px;
            height: 18px;
            fill: var(--white);
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            color: #fca5a5;
            margin-top: 12px;
            display: none;
        }

        .error-msg.visible {
            display: block;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.45);
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: rgba(255, 255, 255, 0.7);
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: var(--white);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes breathingGradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
    </style>
</head>
<body>

<div class="signin-card">
    <div class="signin-logo">
        <img src="assets/images/lotara-logo.png" alt="Lotara">
    </div>
    <h1 class="signin-title">Welcome back</h1>
    <p class="signin-subtitle">Sign in to your wellness portal</p>

    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-signin" id="btn-email-signin">Sign In</button>

    <div class="error-msg" id="error-msg"></div>

    <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">or continue with</span>
        <div class="divider-line"></div>
    </div>

    <button class="btn-apple" id="btn-apple-signin">
        <svg class="apple-icon" viewBox="0 0 814 1000" xmlns="http://www.w3.org/2000/svg">
            <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 790.7 0 663 0 541.8c0-207.8 134.4-318 266.5-318 99.8 0 160.7 47.8 212.9 47.8 50.7 0 122.4-50.7 232.9-50.7 38.7 0 144.6 3.4 211.1 82.2zm-209-224.2c49.7-59.1 85.2-141.5 85.2-223.9 0-11.5-.9-23.2-2.5-34.2-72.6 2.5-159.5 48.5-212.7 117.7-48.7 63-89.2 145.9-89.2 229.6 0 12.7 2.1 25.3 3.7 29.7 4.3.9 11.3 2 18.3 2 65.2 0 144.9-42.5 197.2-121z"/>
        </svg>
        Sign in with Apple
    </button>

    <a href="/" class="back-link">← Back to lotara.app</a>
</div>

<!-- Firebase SDK v9 compat (CDN) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script>
    firebase.initializeApp(FIREBASE_CONFIG);

    // If already signed in, skip to the right page
    firebase.auth().onAuthStateChanged((user) => {
        if (user) {
            window.location.href = isAdmin(user.uid) ? '/admin.html' : '/dashboard.html';
        }
    });

    function showError(msg) {
        const el = document.getElementById('error-msg');
        el.textContent = msg;
        el.classList.add('visible');
    }

    function setLoading(btn, loading) {
        btn.disabled = loading;
        if (loading) {
            btn.innerHTML = '<span class="spinner"></span>Signing in…';
        } else {
            btn.textContent = btn.dataset.orig;
        }
    }

    // Email / password
    const emailBtn = document.getElementById('btn-email-signin');
    emailBtn.dataset.orig = emailBtn.textContent;

    emailBtn.addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        if (!email || !password) { showError('Please enter your email and password.'); return; }
        document.getElementById('error-msg').classList.remove('visible');
        setLoading(emailBtn, true);
        try {
            const cred = await firebase.auth().signInWithEmailAndPassword(email, password);
            window.location.href = isAdmin(cred.user.uid) ? '/admin.html' : '/dashboard.html';
        } catch (err) {
            setLoading(emailBtn, false);
            const messages = {
                'auth/user-not-found': 'No account found with that email.',
                'auth/wrong-password': 'Incorrect password. Please try again.',
                'auth/invalid-email': 'Please enter a valid email address.',
                'auth/too-many-requests': 'Too many attempts. Please try again later.',
            };
            showError(messages[err.code] || 'Sign in failed. Please try again.');
        }
    });

    // Sign in with Apple
    document.getElementById('btn-apple-signin').addEventListener('click', async () => {
        const provider = new firebase.auth.OAuthProvider('apple.com');
        provider.addScope('email');
        provider.addScope('name');
        try {
            const cred = await firebase.auth().signInWithPopup(provider);
            window.location.href = isAdmin(cred.user.uid) ? '/admin.html' : '/dashboard.html';
        } catch (err) {
            if (err.code !== 'auth/popup-closed-by-user') {
                showError('Apple sign in failed. Please try again.');
            }
        }
    });

    // Allow Enter key to submit
    document.getElementById('password').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') emailBtn.click();
    });
</script>
</body>
</html>
