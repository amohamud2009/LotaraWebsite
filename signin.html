<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to your Lotara wellness portal">
    <title>Sign In — Lotara</title>

    <!-- Exact same stylesheets as lotara.app -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/enhancements.css">
    <link rel="stylesheet" href="css/animations.css">

    <style>
        /* Sign-in page uses the same hero background as the main site */
        .signin-page {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px var(--spacing-md) var(--spacing-xl);
            background: linear-gradient(
                135deg,
                #1a1f36 0%,
                #2d3561 25%,
                #748ffc 50%,
                #1a1f36 100%
            );
            background-size: 400% 400%;
            animation: breathingGradient 20s ease-in-out infinite;
            overflow: hidden;
        }

        /* Same ambient orbs as the hero and features sections */
        .signin-page::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -15%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 50%, rgba(139,92,246,0.08) 100%);
            border-radius: 50%;
            animation: breathing 8s ease-in-out infinite;
            pointer-events: none;
        }

        .signin-page::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(167,139,250,0.12) 0%, transparent 50%);
            border-radius: 50%;
            animation: breathing 10s ease-in-out infinite reverse;
            pointer-events: none;
        }

        /* Card uses the exact same glassmorphism as .feature-card */
        .signin-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: var(--spacing-xl) var(--spacing-xl);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: var(--radius-lg);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            color: var(--white);
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .signin-logo {
            display: flex;
            justify-content: center;
            margin-bottom: var(--spacing-md);
        }

        .signin-logo img {
            height: 90px;
            width: auto;
            filter: drop-shadow(0 4px 16px rgba(0, 0, 0, 0.35));
        }

        .signin-headline {
            text-align: center;
            font-size: 28px;
            font-weight: 300;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            color: var(--white);
        }

        .signin-sub {
            text-align: center;
            font-size: 15px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.75);
            margin-bottom: var(--spacing-lg);
        }

        /* Inputs match the glassy aesthetic of the site */
        .form-field {
            margin-bottom: var(--spacing-sm);
        }

        .form-field label {
            display: block;
            font-size: 13px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 6px;
            letter-spacing: 0.01em;
        }

        .form-field input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: var(--radius-md);
            color: var(--white);
            font-family: var(--font-system);
            font-size: 16px;
            font-weight: 300;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-field input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        .form-field input:focus {
            background: rgba(255, 255, 255, 0.13);
            border-color: rgba(255, 255, 255, 0.45);
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.15);
        }

        /* Primary sign-in button — matches the premium/download CTA purple gradient */
        .btn-signin-primary {
            width: 100%;
            padding: 16px;
            margin-top: var(--spacing-sm);
            background: linear-gradient(135deg, var(--purple-primary), #748ffc);
            color: var(--white);
            font-family: var(--font-system);
            font-size: 16px;
            font-weight: 500;
            border: none;
            border-radius: var(--radius-pill);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.35);
            position: relative;
            overflow: hidden;
        }

        .btn-signin-primary::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-signin-primary:hover::before { width: 400px; height: 400px; }

        .btn-signin-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(139, 92, 246, 0.5);
        }

        .btn-signin-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            margin: var(--spacing-md) 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.15);
        }

        .divider-text {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.45);
            font-weight: 300;
        }

        /* Apple button uses same .btn-primary style as the main nav */
        .btn-apple {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.2);
            color: var(--white);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: var(--radius-pill);
            font-family: var(--font-system);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-apple:hover {
            background: var(--white);
            color: var(--purple-primary);
            border-color: var(--white);
            transform: translateY(-1px);
        }

        .btn-apple svg { width: 18px; height: 18px; fill: currentColor; flex-shrink: 0; }

        /* Error state */
        .error-msg {
            display: none;
            margin-top: var(--spacing-sm);
            padding: 12px 16px;
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: var(--radius-sm);
            font-size: 14px;
            color: #fca5a5;
            font-weight: 300;
        }

        .error-msg.show { display: block; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: var(--spacing-md);
            font-size: 14px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover { color: rgba(255, 255, 255, 0.85); }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: var(--white);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @keyframes breathingGradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes breathing {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .signin-card { padding: var(--spacing-lg) var(--spacing-md); }
            .signin-headline { font-size: 24px; }
        }
    </style>
</head>
<body>

    <!-- Same nav as lotara.app — untouched -->
    <nav class="nav" id="main-nav">
        <div class="nav-container">
            <a href="/" class="logo-link">
                <img src="assets/images/lotara-logo.png" alt="Lotara" class="logo-img">
            </a>
            <div class="nav-links">
                <a href="/#features">Features</a>
                <a href="/#premium">Premium</a>
                <a href="about/">About</a>
                <a href="signin.html" class="btn-login">Sign In</a>
                <a href="https://apps.apple.com/us/app/lotara/id6749601041" class="btn-primary" target="_blank" rel="noopener noreferrer">Download Free</a>
            </div>
        </div>
    </nav>

    <!-- Sign-in page — same background as hero + features sections -->
    <div class="signin-page">
        <div class="signin-card">

            <div class="signin-logo">
                <img src="assets/images/lotara-logo.png" alt="Lotara">
            </div>

            <h1 class="signin-headline">Welcome back</h1>
            <p class="signin-sub">Sign in to your wellness portal</p>

            <div class="form-field">
                <label for="email">Email address</label>
                <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
            </div>

            <div class="form-field">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
            </div>

            <button class="btn-signin-primary" id="btn-email">Sign In</button>

            <div class="error-msg" id="error-msg"></div>

            <div class="divider">
                <div class="divider-line"></div>
                <span class="divider-text">or</span>
                <div class="divider-line"></div>
            </div>

            <button class="btn-apple" id="btn-apple">
                <svg viewBox="0 0 814 1000" xmlns="http://www.w3.org/2000/svg">
                    <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 790.7 0 663 0 541.8c0-207.8 134.4-318 266.5-318 99.8 0 160.7 47.8 212.9 47.8 50.7 0 122.4-50.7 232.9-50.7 38.7 0 144.6 3.4 211.1 82.2zm-209-224.2c49.7-59.1 85.2-141.5 85.2-223.9 0-11.5-.9-23.2-2.5-34.2-72.6 2.5-159.5 48.5-212.7 117.7-48.7 63-89.2 145.9-89.2 229.6 0 12.7 2.1 25.3 3.7 29.7 4.3.9 11.3 2 18.3 2 65.2 0 144.9-42.5 197.2-121z"/>
                </svg>
                Sign in with Apple
            </button>

            <a href="/" class="back-link">← Back to lotara.app</a>

        </div>
    </div>

    <!-- Nav scroll effect (same as main site) -->
    <script>
        window.addEventListener('scroll', () => {
            document.getElementById('main-nav').classList.toggle('scrolled', window.scrollY > 20);
        });
    </script>

    <!-- Firebase SDK v9 compat (CDN only — no Vercel, no bundler) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        firebase.initializeApp(FIREBASE_CONFIG);

        // If already signed in, skip straight to the right page
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                window.location.href = isAdmin(user.uid) ? '/admin.html' : '/dashboard.html';
            }
        });

        const emailBtn = document.getElementById('btn-email');
        const errorEl  = document.getElementById('error-msg');

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.classList.add('show');
        }

        function setLoading(loading) {
            emailBtn.disabled = loading;
            emailBtn.innerHTML = loading
                ? '<span class="spinner"></span>Signing in…'
                : 'Sign In';
        }

        // ── Email / password ──
        emailBtn.addEventListener('click', async () => {
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) { showError('Please enter your email and password.'); return; }
            errorEl.classList.remove('show');
            setLoading(true);
            try {
                const cred = await firebase.auth().signInWithEmailAndPassword(email, password);
                window.location.href = isAdmin(cred.user.uid) ? '/admin.html' : '/dashboard.html';
            } catch (err) {
                setLoading(false);
                const map = {
                    'auth/user-not-found':    'No account found with that email.',
                    'auth/wrong-password':    'Incorrect password. Please try again.',
                    'auth/invalid-email':     'Please enter a valid email address.',
                    'auth/invalid-credential':'Incorrect email or password.',
                    'auth/too-many-requests': 'Too many attempts. Please wait a moment and try again.',
                };
                showError(map[err.code] || 'Sign in failed. Please try again.');
            }
        });

        // ── Enter key submits ──
        document.getElementById('password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') emailBtn.click();
        });
        document.getElementById('email').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('password').focus();
        });

        // ── Apple Sign-In ──
        document.getElementById('btn-apple').addEventListener('click', async () => {
            const provider = new firebase.auth.OAuthProvider('apple.com');
            provider.addScope('email');
            provider.addScope('name');
            try {
                const cred = await firebase.auth().signInWithPopup(provider);
                window.location.href = isAdmin(cred.user.uid) ? '/admin.html' : '/dashboard.html';
            } catch (err) {
                if (err.code !== 'auth/popup-closed-by-user') {
                    showError('Apple sign in failed. Please try again.');
                }
            }
        });
    </script>

</body>
</html>
